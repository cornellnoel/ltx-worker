name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Cycle RunPod workers to pull new image
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          echo "Setting workers to 0..."
          curl -s -X POST "https://api.runpod.io/graphql?api_key=$RUNPOD_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation { saveEndpoint(input: { id: \"k0jb3n48yea4jb\", name: \"ltx-worker\", gpuIds: \"NVIDIA RTX PRO 6000 Blackwell\", workersMax: 0 }) { id } }"}'
          echo "Waiting 30s..."
          sleep 30
          echo "Setting workers to 1..."
          curl -s -X POST "https://api.runpod.io/graphql?api_key=$RUNPOD_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation { saveEndpoint(input: { id: \"k0jb3n48yea4jb\", name: \"ltx-worker\", gpuIds: \"NVIDIA RTX PRO 6000 Blackwell\", workersMax: 1 }) { id } }"}'
          echo "Workers cycled. New image will be pulled on next job."
